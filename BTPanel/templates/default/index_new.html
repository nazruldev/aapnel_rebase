<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="referer" content="never" />
		<meta name="renderer" content="webkit" />
		<link rel="shortcut icon" href="{{ g.panel_theme.logo.favicon }}" type="image/x-icon" />
		<link rel="stylesheet" href="/static/bootstrap-3.3.5/css/bootstrap.min.css?v=1778752098997" />

		<link rel="stylesheet" href="/static/oldcss/site.css?v=1778752098997" />
		<link rel="stylesheet" href="/static/vite/iconfont/iconfont.css?v=1778752098997" />
		<!-- naive-ui 的样式会出现在这里 -->
		<meta name="naive-ui-style" />
		<title>{{ session['title'] }}</title>
		<script>
			window.__PANEL_OFFLINE_MODE = {{ data.get('offline_mode', False) | tojson }};
			window.__BUILTIN_PLUGINS = {{ data.get('builtin_plugins', {}) | tojson }};
			window.sites_path = {{ session.get('config', {}).get('sites_path', '') | tojson }};
			window.webserver = {{ session.get('webserver', '') | tojson }};
			window.distribution = {{ session.get('config', {}).get('distribution', '') | tojson }};
			window.panelVersion = {{ session.get('version', '') | tojson }};
			window.vite_menus = '{{ g.menus | default([]) | string | e }}';
			window.isSetup = {{ data.get('isSetup', False) | tojson }};
			window.public_key = {{ data.get('public_key', '') | tojson }};
			window.translations = {{ data.get('translations', '') | tojson }};
			window.vite_public_panel_theme = '{{ g.panel_theme | default({}) | string | e }}';

			var sessionInfo = {{ {
				'title': session.get('title', ''),
				'username': session.get('username', ''),
				'statusCode': data.get('status_code', '')
			} | tojson }};
		</script>
		{% if data.get('offline_mode') %}
		<link rel="stylesheet" href="/static/css/offline_commercial.css?v={{ session['version'] }}-6" />
		<script src="/static/js/offline_patch_vite.js?v={{ session['version'] }}-6"></script>
		{% endif %}
		<script type="module" crossorigin src="/static/vite/js/index-DV9DrNIN.js?v=1778752098997"></script>
		<link rel="modulepreload" crossorigin href="/static/vite/js/prismjs-CP0O0FCs.js?v=1778752098997">
		<link rel="modulepreload" crossorigin href="/static/vite/js/vue-core-27PG2C1f.js?v=1778752098997">
		<link rel="modulepreload" crossorigin href="/static/vite/js/naive-ui-D6uRvKd0.js?v=1778752098997">
		<link rel="stylesheet" crossorigin href="/static/vite/css/prismjs-D-3FhBe_.css?v=1778752098997">
		<link rel="stylesheet" crossorigin href="/static/vite/css/index-BK3Gkn0B.css?v=1778752098997">

	</head>
	<body>
		<a
			style="display: none"
			id="panel_debug"
			data="{{ g.debug }}"
			data-pyversion="{{ g.pyversion }}"></a>
		<a style="display: none" id="request_token_head" token="{{ session['request_token_head'] }}"></a>
		<a style="display: none" id="recycle_bin" data="{{ data.get('recycle_bin', False) }}"></a>

		<div id="app"></div>

</html>
